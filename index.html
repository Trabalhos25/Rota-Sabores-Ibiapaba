<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
       
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        font-family: 'Cormorant Garamond', serif;
        overflow-y: auto;
        padding: 40px 0;
    }

    /* FUNDO FIXO */
    .background {
        position: fixed; 
        top: 0;
        left: 0;
        width: 100vw; 
        height: 100vh; 
        z-index: -1; 
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('logo.jpeg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: brightness(0.5); 
    }

    /* CARD CONTAINER */
    .card {
        position: relative;
        width: 100%;
        max-width: 380px; 
        padding: 40px 20px;
        border-radius: 25px;
        text-align: center;
        backdrop-filter: blur(5px);
        animation: entrada 1.5s ease;
    }

    /* FOTO PROFILE */
    .profile {
        width: 170px;
        height: 170px;
        margin: auto;
        border-radius: 50%;
        padding: 5px;
        border: 4px solid #d4af37;
        animation: flutuar 4s infinite ease-in-out;
    }

    .profile img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }

    /* NOME */
    .nome {
        margin-top: 25px;
        font-size: 55px;
        color: #d4af37;
        font-family: 'Great Vibes', cursive;
        line-height: 1.1;
    }

    /* BOTÕES CONTAINER */
    .buttons {
        margin-top: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 45px; /* Espaço para a logo de cada botão */
    }

    /* ESTILIZAÇÃO DO BOTÃO PADRÃO - CORRIGIDO */
    .btn-links {
        position: relative; 
        display: flex;
        align-items: center;
        justify-content: center;
        width: 320px; 
        height: 60px; 
        border: 2px solid #D4AF37; 
        background-color: transparent; 
        color: #D4AF37; 
        text-decoration: none;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 14px; 
        letter-spacing: 1px;
        transition: all 0.3s ease;
        z-index: 1;
    }

    /* ÍCONE DO WHATSAPP FIXADO À ESQUERDA */
    .btn-links i {
        position: absolute;
        left: 20px;
        font-size: 22px;
        color: #D4AF37;
        transition: all 0.3s ease;
    }

    /* TEXTO DO BOTÃO */
    .btn-links span {
        text-align: center;
        padding-left: 25px; /* Evita que o texto bata no ícone */
    }

    /* NOVO EFEITO HOVER (Preenche o fundo suavemente sem quebrar) */
    .btn-links:hover {
        background-color: #D4AF37;
        color: #000000;
        transform: scale(1.02);
    }

    .btn-links:hover i {
        color: #000000;
    }

    /* A MÁGICA DA LOGO FLUTUANTE */
    .logo-botao {
        position: absolute;
        top: -25px; 
        left: 50%;
        transform: translateX(-50%); 
        width: 50px; 
        height: 50px;
        object-fit: cover;
        background-color: #1a1a1a; /* Cor escura sólida para cobrir a linha dourada atrás */
        border-radius: 50%; 
        border: 2px solid #D4AF37; /* Adiciona uma bordinha dourada charmosa na logo */
    }

    /* ANIMAÇÕES */
    @keyframes entrada {
        from {
            opacity: 0;
            transform: translateY(80px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes flutuar {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* RESPONSIVO */
    @media(max-width: 400px) {
        .card {
            width: 95%;
        }
        .nome {
            font-size: 45px;
        }
        .btn-links {
            width: 290px;
            font-size: 12px;
        }
    }
    /* ESTILIZAÇÃO DO RODAPÉ */
body {
    min-height: 100vh;
    display: flex;
    flex-direction: column; /* Força os elementos (fundo, card) a respeitarem a ordem de cima para baixo */
    justify-content: center;
    align-items: center;
    background: #000;
    font-family: 'Cormorant Garamond', serif;
    overflow-y: auto;
    padding: 40px 0;
}

/* Ajuste fino do Rodapé */
.rodape-site {
    margin-top: 40px; /* Cria um distanciamento elegante do último botão */
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: rgba(212, 175, 55, 0.6); /* Dourado suave */
    letter-spacing: 1px;
    line-height: 1.6;
}

.rodape-site a {
    color: #9b7e20;
    text-decoration: none;
    font-weight: bold;
}

.rodape-site a:hover {
    color: #ffffff;
    text-decoration: underline;
}

    </style>
</head>
