<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
  

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#000;

    font-family:'Cormorant Garamond', serif;

    overflow-y:auto;

    padding:40px 0;
}

/* FUNDO */

.background {
    position: fixed; /* Mantém o fundo fixo enquanto o usuário rola a página */
    top: 0;
    left: 0;
    width: 100vw; /* Garante 100% da largura da tela */
    height: 100vh; /* Garante 100% da altura da tela */
    z-index: -1; /* Joga o fundo para trás de todos os botões e textos */

    /* Seu gradiente e a imagem de fundo */
    background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('logo.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    /* Dica: Como você já usou rgba() escuro no gradiente, 
       talvez não precise do filter, mas mantive se achar necessário */
    filter: brightness(0.5); 
}
/* CARD */

.card{
    position:relative;

    width:350px;

    padding:40px 30px;

    border-radius:25px;

    text-align:center;

    backdrop-filter:blur(5px);

    animation:entrada 1.5s ease;
}

/* FOTO */

.profile{
    width:170px;
    height:170px;

    margin:auto;

    border-radius:50%;

    padding:5px;

    border:4px solid #d4af37;

    animation:flutuar 4s infinite ease-in-out;
}

.profile img{
    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;
}

/* NOME */

.nome{
    margin-top:25px;

    font-size:55px;

    color:#d4af37;

    font-family:'Great Vibes', cursive;
}

/* PROFISSÃO */

.profissao{
    margin-top:10px;

    letter-spacing:8px;

    color:#d4af37;

    font-size:14px;
}

/* BOTÕES */

.buttons{
    margin-top:40px;

    display:flex;
    flex-direction:column;
    gap:20px;
}

.buttons a{
    text-decoration:none;

    color:#d4af37;

    border:2px solid #d4af37;

    padding:18px;

    font-size:28px;

    transition:0.4s;

    position:relative;

    overflow:hidden;
}

/* EFEITO HOVER */

.buttons a::before{
    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:#d4af37;

    transition:0.5s;

    z-index:-1;
}

.buttons a:hover::before{
    left:0;
}

.buttons a:hover{
    color:black;

    transform:scale(1.05);
}

/* ÍCONES */

.buttons i{
    margin-right:12px;
}

/* ANIMAÇÕES */

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(80px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes flutuar{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* RESPONSIVO */

@media(max-width:400px){

    .card{
        width:90%;
    }

    .nome{
        font-size:45px;
    }

    .buttons a{
        font-size:22px;
    }
}

</style>
</head>
